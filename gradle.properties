# Compiler Configuration
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
android.disallowKotlinSourceSets=false
kotlin.code.style=official
kotlin.incremental.useClasspathSnapshot=true
android.injected.testOnly=false

# Release Signing Info
# 真实签名值请在本地填写，切勿提交（keystore 与密码不入库；packing/ 已 gitignore）
RELEASE_STORE_FILE=../packing/nexus_release.jks
RELEASE_STORE_PASSWORD=CHANGE_ME
RELEASE_KEY_ALIAS=nexus_key
RELEASE_KEY_PASSWORD=CHANGE_ME
