name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p packing
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > packing/nexus_release.jks

      - name: Build signed release APK
        env:
          STORE_PW: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PW: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PRELEASE_STORE_PASSWORD="$STORE_PW" \
            -PRELEASE_KEY_ALIAS="$KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$KEY_PW"

      - name: Resolve version name
        id: version
        run: |
          VN=$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"(.*)".*/\1/')
          echo "name=$VN" >> "$GITHUB_OUTPUT"

      - name: Stage APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "agentic-nexus-${{ steps.version.outputs.name }}.apk"

      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: agentic-nexus-${{ steps.version.outputs.name }}
          path: agentic-nexus-*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            agentic-nexus-*.apk \
            --title "${{ github.ref_name }}" \
            --generate-notes
